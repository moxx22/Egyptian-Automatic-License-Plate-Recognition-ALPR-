<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Plate Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-area {
            border: 3px dashed #bdc3c7;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            background: #f8f9fa;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }

        .upload-area.dragover {
            border-color: #2ecc71;
            background: #d5f4e6;
        }

        .upload-icon {
            font-size: 4em;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .browse-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .browse-btn:hover {
            background: #2980b9;
        }

        .preview-area {
            margin-top: 30px;
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .process-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: none;
        }

        .process-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .process-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
        }

        .results h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .plate-result {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .plate-text {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 10px 0;
            direction: rtl;
        }

        .plate-info {
            color: #7f8c8d;
            text-align: center;
            font-size: 0.9em;
        }

        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .success {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.9em;
            border-top: 1px solid #ecf0f1;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .plate-text {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 License Plate Recognition</h1>
            <p>Upload an image to detect and recognize license plates automatically</p>
        </div>

        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Drag & drop an image here or click to browse</div>
                <button class="browse-btn" onclick="document.getElementById('fileInput').click()">
                    Browse Files
                </button>
                <input type="file" id="fileInput" class="file-input" accept="image/*">
            </div>

            <div class="preview-area">
                <img id="previewImage" class="preview-image" alt="Preview">
                <button id="processBtn" class="process-btn">Process Image</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing image... This may take a few seconds</p>
            </div>

            <div class="error" id="errorMessage"></div>
            <div class="success" id="successMessage"></div>

            <div class="results" id="results">
                <h3>Recognition Results</h3>
                <div id="resultsContent"></div>
            </div>
        </div>

        <div class="footer">
            <p>License Plate Recognition System &copy; 2025</p>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const resultsContent = document.getElementById('resultsContent');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        let currentFile = null;

        // Drag and drop functionality
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Click on upload area - only trigger if not clicking the browse button
        uploadArea.addEventListener('click', (e) => {
            // Don't trigger if clicking the browse button (it has its own handler)
            if (!e.target.classList.contains('browse-btn')) {
                fileInput.click();
            }
        });

        function handleFile(file) {
            if (!file.type.match('image.*')) {
                showError('Please select a valid image file (PNG, JPG, JPEG, GIF)');
                return;
            }

            currentFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
                processBtn.style.display = 'block';
                hideMessages();
                hideResults();
            };
            reader.readAsDataURL(file);
        }

        // Process button click
        processBtn.addEventListener('click', processImage);

        function processImage() {
            if (!currentFile) return;

            // Show loading, hide other elements
            loading.style.display = 'block';
            processBtn.disabled = true;
            hideMessages();
            hideResults();

            const formData = new FormData();
            formData.append('file', currentFile);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                processBtn.disabled = false;

                if (data.success) {
                    showResults(data);
                    showSuccess(data.message);
                    
                    // Clean up temporary files
                    if (data.session_id) {
                        fetch(`/cleanup/${data.session_id}`, { method: 'POST' });
                    }
                } else {
                    showError(data.message);
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                processBtn.disabled = false;
                showError('Network error: ' + error.message);
            });
        }

        function showResults(data) {
            resultsContent.innerHTML = '';
            
            if (data.results && data.results.length > 0) {
                data.results.forEach((result, index) => {
                    const plateDiv = document.createElement('div');
                    plateDiv.className = 'plate-result';
                    plateDiv.innerHTML = `
                        <div class="plate-info">Plate ${index + 1}</div>
                        <div class="plate-text">${result.plate_text}</div>
                        <div class="plate-info">${result.character_count} characters detected</div>
                    `;
                    resultsContent.appendChild(plateDiv);
                });
                results.style.display = 'block';
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function hideResults() {
            results.style.display = 'none';
        }

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
    </script>
</body>
</html>
